<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nest Camera Feed</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; color: white; font-family: sans-serif; overflow: hidden; }

  #video-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: calc(100vh - 100px);
      display: flex; justify-content: center; align-items: center;
  }
  video, #live-viewer { max-width: 100%; max-height: 100%; object-fit: contain; }

  #timeline-wrapper {
      position: absolute; bottom: 0; left: 0; width: 100vw; height: 100px;
      background: #111; border-top: 1px solid #333;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 0 40px; box-sizing: border-box;
  }

  #timeline-label {
      font-size: 16px; margin-bottom: 5px; font-weight: bold; color: #eee; font-family: monospace; letter-spacing: 1px;
  }

  input[type=range] {
      -webkit-appearance: none; width: 100%; height: 8px; border-radius: 4px; background: #444; outline: none; margin: 10px 0; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: white; cursor: pointer; box-shadow: 0 0 4px rgba(0,0,0,0.5);
  }
  input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%; background: white; cursor: pointer; border: none; box-shadow: 0 0 4px rgba(0,0,0,0.5);
  }

  #timeline-marks {
      position: relative; width: 100%; height: 20px;
  }
  .mark {
      position: absolute; border-left: 1px solid #777; height: 10px; font-size: 11px; color: #aaa; padding-left: 4px; line-height: 10px;
  }
</style>
</head>
<body>
    <div id="video-container">
        <video id="player" autoplay playsinline muted></video>
        <img id="live-viewer" style="display: none;">
    </div>

    <div id="timeline-wrapper">
        <div id="timeline-label">Loading...</div>
        <input type="range" id="timeline" min="0" max="100" value="100" step="1000">
        <div id="timeline-marks"></div>
    </div>

    <script type="text/javascript" src="js/main.js"></script>
</body>
</html>
